name: check dist

on:
  pull_request:
    paths:
      - "setup-cli/src/**"
      - "setup-cli/package.json"
      - "setup-cli/pnpm-lock.yaml"
      - "template-publish/src/**"
      - "template-publish/package.json"
      - "template-publish/pnpm-lock.yaml"
      - ".github/workflows/check-dist.yaml"
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        action: [setup-cli, template-publish]
    defaults:
      run:
        working-directory: ${{ matrix.action }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ${{ matrix.action }}/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Verify dist is in sync
        run: |
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ is out of sync with src/. Run 'pnpm build' in ${{ matrix.action }}/ and commit the result."
            exit 1
          fi
